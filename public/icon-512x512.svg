<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="60%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#011c15" />
    </radialGradient>

    <!-- Glowing Aura -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>

    <!-- Ice Block Gradients -->
    <linearGradient id="iceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#bae6fd" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.8" />
    </linearGradient>

    <linearGradient id="iceLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.95" />
    </linearGradient>

    <linearGradient id="iceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#075985" stop-opacity="0.95" />
    </linearGradient>

    <!-- Frost Crystal Shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Maskable background container -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Inner border ring -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="#047857" stroke-width="4" stroke-opacity="0.4" />
  <rect x="28" y="28" width="456" height="456" rx="84" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.2" />

  <!-- Ambient Glow behind the ice cube -->
  <circle cx="256" cy="240" r="180" fill="url(#glow)" />

  <!-- Sparkles / Stars -->
  <g id="sparkles">
    <!-- Top-Right Sparkle -->
    <path d="M380,130 L383,145 L398,148 L383,151 L380,166 L377,151 L362,148 L377,145 Z" fill="#ffffff" opacity="0.9" />
    <circle cx="380" cy="148" r="4" fill="#a7f3d0" />

    <!-- Left Sparkle -->
    <path d="M120,280 L122,290 L132,292 L122,294 L120,304 L118,294 L108,292 L118,290 Z" fill="#ffffff" opacity="0.8" />
    
    <!-- Top-Left Soft Star -->
    <path d="M150,120 L152,128 L160,130 L152,132 L150,140 L148,132 L140,130 L148,128 Z" fill="#7dd3fc" opacity="0.7" />
  </g>

  <!-- ISOMETRIC ICE BLOCK -->
  <g transform="translate(0, -10)">
    <!-- Ice Block Shadow -->
    <ellipse cx="256" cy="385" rx="130" ry="30" fill="#000000" opacity="0.4" filter="blur(8px)" />

    <!-- Left Face -->
    <path d="M136,230 L256,295 L256,380 L136,315 Z" fill="url(#iceLeft)" />

    <!-- Right Face -->
    <path d="M256,295 L376,230 L376,315 L256,380 Z" fill="url(#iceRight)" />

    <!-- Top Face -->
    <path d="M256,145 L376,230 L256,295 L136,230 Z" fill="url(#iceTop)" />

    <!-- Highlights and Reflections on Front Edges -->
    <!-- Vertical center highlight -->
    <line x1="256" y1="295" x2="256" y2="380" stroke="#bae6fd" stroke-width="3" stroke-linecap="round" opacity="0.6" />
    <!-- Top edge reflections -->
    <path d="M136,230 L256,295 L376,230" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    <!-- Back top edge reflection -->
    <path d="M136,230 L256,145 L376,230" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />

    <!-- Internal fracture/frozen air bubbles inside ice -->
    <path d="M220,260 Q240,280 230,310" fill="none" stroke="#e0f2fe" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
    <path d="M280,250 Q270,290 290,320" fill="none" stroke="#e0f2fe" stroke-width="2" stroke-linecap="round" opacity="0.4" />
    <circle cx="190" cy="280" r="3" fill="#ffffff" opacity="0.6" />
    <circle cx="310" cy="270" r="4" fill="#ffffff" opacity="0.5" />
    <circle cx="270" cy="340" r="2.5" fill="#ffffff" opacity="0.7" />
    <circle cx="230" cy="350" r="3.5" fill="#ffffff" opacity="0.5" />
  </g>

  <!-- Urdu Text / Brand Label (Highly elegant and humble design integrated smoothly) -->
  <g transform="translate(0, 30)">
    <!-- Circular gold plate base for text -->
    <rect x="146" y="385" width="220" height="45" rx="22" fill="#047857" fill-opacity="0.9" stroke="#34d399" stroke-width="1.5" />
    
    <text x="256" y="413" 
          font-family="'Noto Naskh Arabic', 'Lateef', 'Inter', sans-serif" 
          font-size="20" 
          font-weight="bold" 
          fill="#fffcf0" 
          text-anchor="middle" 
          letter-spacing="0.5">
      بسم اللہ آئس فیکٹری
    </text>
  </g>
</svg>
